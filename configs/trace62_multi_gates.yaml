# trace62: trace29 + multiple gates curriculum (FIXED - with proper dynamic pool)
#
# Base: trace29 from 580K checkpoint (with optimizer reset)
# New: Multiple gates with progressive bonuses: -2, -1, 0.0, 0.5
# Strategy: Curriculum climbing - get bonus at each gate
# Goal: Push mean reward above -1.0
# FIXED: Use same dynamic pool as trace61 (min_affinity still -10 but bands filter it)

total_timesteps: 2_000_000
n_envs: 8
n_steps: 32
batch_size: 256
n_epochs: 4
learning_rate: 1.5e-4
gamma: 0.98
gae_lambda: 0.95
clip_range: 0.2
entropy_coef: 0.012
vf_coef: 0.5
max_grad_norm: 0.5

max_tcr_len: 20
min_tcr_len: 8
max_pep_len: 25
max_steps_per_episode: 8
max_steps: 8
hla_pseudoseq_len: 34
ban_stop: true
terminal_reward_only: true

hidden_dim: 512
esm_model: "esm2_t33_650M_UR50D"
esm_frozen: true
esm_device: "cuda:2"
esm_tcr_cache_size: 4096
encoder: "esm2"

# Multi-gate curriculum reward
reward_mode: "v2_curriculum_climbing"
use_delta_reward: false
w_affinity: 1.0
w_decoy: 0.3
w_naturalness: 0.05
w_diversity: 0.02

# Five gates with progressive bonuses (added -3.0 gate)
curriculum_gates: [-3.0, -2.0, -1.0, 0.0, 0.5]
curriculum_bonuses: [0.5, 1.0, 1.5, 2.0, 2.5]
decoy_activation_threshold: 999.0  # Disable decoy for now
gap_margin: 0.5
w_gap: 0.3

affinity_model: "tfold"
tfold_server_socket: "/tmp/tfold_server_trace62_multi_gates.sock"
tfold_cache_path: "data/tfold_feature_cache.db"  # Use existing large cache (read-only)
disable_tfold_cache: false

# No decoy (same as trace61)
decoy_K: 2
n_contrast_decoys: 0
contrastive_agg: "mean"
decoy_tau: 10.0
decoy_tier_weights: {A: 0, B: 0, D: 0, C: 0}
decoy_unlock_schedule: {}
decoy_difficulty: "easy"
decoy_difficulty_schedule: {}

# Gate and bonus (kept for compatibility with reward_manager, but unused since reward_mode is v2_curriculum_climbing)
target_affinity_gate: -0.5
target_affinity_bonus: 1.0
decoy_affinity_penalty_weight: 0.3

naturalness_threshold_zscore: -2.0
cdr3_ppl_stats: "data/cdr3_ppl_stats.json"
diversity_buffer_size: 512
diversity_similarity_threshold: 0.85

# Pure L2 base (50% from start, will mix with online pool)
l0_mutation_range: [3, 5]
l1_top_k: 500
curriculum_schedule:
  - {until: null, L0: 0.0, L1: 0.0, L2: 1.0}

# Online pool with dynamic band selection (same as trace61)
online_tcr_pool_enabled: true
online_tcr_pool_start_step: 600000  # Start from trace61 600K checkpoint
online_tcr_pool_warmup_steps: 1
online_tcr_pool_max_ratio: 0.5
online_tcr_pool_max_per_target: 256
online_tcr_pool_min_affinity: -4.0  # FIXED: Only accept TCRs >= -4.0
online_tcr_pool_max_decoy_violation: 999.0
online_tcr_pool_min_hamming: 2
online_tcr_pool_mutate_prob: 0.0

# Dynamic band selection
online_tcr_pool_use_dynamic_bands: true
online_tcr_pool_recent_window: 50
online_tcr_pool_sample_bands:
  - {until: null, min: -4.0, max: 0.6}  # FIXED: Only sample TCRs in [-4, 0.6]

target_sampling: "uniform"
train_targets: "data/tfold_excellent_peptides.txt"

eval_interval: 999999999
eval_n_tcrs: 5
eval_n_decoys: 0
eval_abort_threshold: 0.40
eval_warmup: 500000

checkpoint_interval: 20000
latest_checkpoint_interval: 2000
milestones: [620000, 640000, 660000, 680000, 700000, 720000, 740000, 760000, 
  780000, 800000, 900000, 1000000, 1200000, 1400000, 1600000, 1800000, 2000000]

use_znorm: false
