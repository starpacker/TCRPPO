# trace80: Hybrid strategy combining trace72's stability + trace78's exploration
#
# Base: trace72 checkpoint (best mean affinity -0.974)
# Strategy: Inject trace78's aggressive exploration parameters
# Goal: Achieve higher max affinity while maintaining good mean affinity

total_timesteps: 2_000_000
n_envs: 8
n_steps: 32
batch_size: 256
n_epochs: 4
learning_rate: 0.0004  # More aggressive than trace72's 1.5e-4
gamma: 0.98
gae_lambda: 0.95
clip_range: 0.2
entropy_coef: 0.02  # Higher entropy for more exploration (trace72: 0.012)
vf_coef: 0.5
max_grad_norm: 0.3  # Lower for stability (trace72: 0.5)

max_tcr_len: 20
min_tcr_len: 8
max_pep_len: 25
max_steps_per_episode: 8
max_steps: 8
hla_pseudoseq_len: 34
ban_stop: true
terminal_reward_only: false  # Per-step reward like trace72

hidden_dim: 512
esm_model: "esm2_t33_650M_UR50D"
esm_frozen: true
esm_device: "cuda"
esm_tcr_cache_size: 4096
encoder: "esm2"

# Reward: trace72's delta reward + more aggressive affinity weight
reward_mode: "v2_simple_target_gated_decoy"
use_delta_reward: true  # Key feature from trace72
w_affinity: 1.2  # Higher than trace72's 1.0
w_decoy: 0.5  # Lower than trace72's 0.8 (allow more exploration)
w_naturalness: 0.05
w_diversity: 0.02

# Gate settings (from trace72)
target_decoy_gate_logit: -1.5
target_affinity_gate: -0.5
target_affinity_bonus: 1.0
decoy_affinity_penalty_weight: 0.5

affinity_model: "tfold"
affinity_scorer: "tfold"
tfold_server_socket: "/tmp/tfold_server_trace80_hybrid.sock"
tfold_cache_path: "data/tfold_feature_cache_trace80_hybrid.db"

# Decoy settings
decoy_K: 2
n_contrast_decoys: 2
contrastive_agg: "logsumexp"
decoy_tau: 10.0
decoy_tier_weights: {A: 3, B: 3, D: 2, C: 1}
decoy_unlock_schedule:
  0: [A, B]
  100000: [D]
  200000: [C]
decoy_difficulty: "medium"
decoy_difficulty_schedule: {}

naturalness_threshold_zscore: -2.0
cdr3_ppl_stats: "data/cdr3_ppl_stats.json"
diversity_buffer_size: 512
diversity_similarity_threshold: 0.85

# Curriculum: More L2 random exploration initially
l0_mutation_range: [3, 5]
l1_top_k: 500
curriculum_schedule:
  - {until: 100000, L0: 0.0, L1: 0.0, L2: 0.4}  # More random exploration
  - {until: 500000, L0: 0.0, L1: 0.0, L2: 0.3}
  - {until: 1000000, L0: 0.0, L1: 0.0, L2: 0.2}
  - {until: null, L0: 0.0, L1: 0.0, L2: 0.1}

target_sampling: "uniform"
train_targets: "data/tfold_excellent_peptides.txt"

eval_interval: 100000
eval_n_tcrs: 50
eval_n_decoys: 50
eval_abort_threshold: 0.40
eval_warmup: 500000

checkpoint_interval: 20000
latest_checkpoint_interval: 2000
milestones: [100000, 200000, 300000, 400000, 500000, 600000, 700000, 800000,
  900000, 1000000, 1200000, 1400000, 1600000, 1800000, 2000000]

use_znorm: true
znorm_clip: 5.0  # Allow larger reward signals
