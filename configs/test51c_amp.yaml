# test51c_amp: Resume from test51c 100K checkpoint with AMP-accelerated tFold
# Key changes from test51c:
#   - affinity_model: tfold -> tfold_amp (3.97× faster inference)
#   - Resume from: output/test51c_no_decoy_long_ep/checkpoints/milestone_100000.pt
#   - All other settings identical to test51c

# === PPO ===
total_timesteps: 2_000_000
n_envs: 8
n_steps: 32
batch_size: 256
n_epochs: 4
learning_rate: 3.0e-4
gamma: 0.98
gae_lambda: 0.95
clip_range: 0.2
entropy_coef: 0.05
vf_coef: 0.5
max_grad_norm: 0.5

# === Environment ===
max_tcr_len: 20
min_tcr_len: 8
max_pep_len: 25
max_steps_per_episode: 8
hla_pseudoseq_len: 34

# === Policy Network ===
hidden_dim: 512

# === ESM State Encoder ===
esm_model: "esm2_t33_650M_UR50D"
esm_frozen: true
esm_device: "cuda"
esm_tcr_cache_size: 4096

# === Reward Weights (V2 No Decoy) ===
w_affinity: 1.0
w_decoy: 0.0
w_naturalness: 0.5
w_diversity: 0.2

# === Credit Assignment ===
use_delta_reward: false

# === Affinity Scorer (AMP-accelerated tFold) ===
affinity_model: "tfold_amp"  # Changed from "tfold"
tfold_cache_path: "data/tfold_feature_cache.db"  # Shared cache with test51c

# === Decoy Scorer (DISABLED) ===
decoy_K: 0
decoy_tau: 10.0
decoy_tier_weights:
  A: 0
  B: 0
  D: 0
  C: 0
decoy_unlock_schedule:
  0: []

# === Naturalness Scorer (ESM Perplexity) ===
naturalness_threshold_zscore: -2.0
cdr3_ppl_stats: "data/cdr3_ppl_stats.json"

# === Diversity Scorer ===
diversity_buffer_size: 512
diversity_similarity_threshold: 0.85

# === Curriculum (L0 + L2, no L1) ===
l0_mutation_range: [3, 5]
l1_top_k: 500
curriculum_schedule:
  - {until: null, L0: 0.5, L1: 0.0, L2: 0.5}

# === Target Sampling ===
target_sampling: "uniform"

# === Online Eval (DISABLED) ===
eval_interval: 999999999
eval_n_tcrs: 5
eval_n_decoys: 50
eval_abort_threshold: 0.40
eval_warmup: 500000

# === Checkpointing ===
checkpoint_interval: 20000
latest_checkpoint_interval: 2000
milestones: [20000, 40000, 60000, 80000, 100000, 120000, 140000, 160000, 180000, 200000, 220000, 240000, 260000, 280000, 300000, 320000, 340000, 360000, 380000, 400000, 420000, 440000, 460000, 480000, 500000, 520000, 540000, 560000, 580000, 600000, 620000, 640000, 660000, 680000, 700000, 720000, 740000, 760000, 780000, 800000, 820000, 840000, 860000, 880000, 900000, 920000, 940000, 960000, 980000, 1000000, 1020000, 1040000, 1060000, 1080000, 1100000, 1120000, 1140000, 1160000, 1180000, 1200000, 1220000, 1240000, 1260000, 1280000, 1300000, 1320000, 1340000, 1360000, 1380000, 1400000, 1420000, 1440000, 1460000, 1480000, 1500000, 1520000, 1540000, 1560000, 1580000, 1600000, 1620000, 1640000, 1660000, 1680000, 1700000, 1720000, 1740000, 1760000, 1780000, 1800000, 1820000, 1840000, 1860000, 1880000, 1900000, 1920000, 1940000, 1960000, 1980000, 2000000]

# === Reward Mode ===
reward_mode: "v2_no_decoy"

# === Contrastive Reward (DISABLED) ===
n_contrast_decoys: 0
contrastive_agg: "mean"

# === Normalization (DISABLED) ===
use_znorm: false
norm_window: 10000
norm_warmup: 1000

# === Seed ===
seed: 42

# === Paths ===
decoy_library_path: "/share/liuyutian/pMHC_decoy_library"
tcrdb_path: "/share/liuyutian/TCRPPO/data/tcrdb"
test_peptides_path: "/share/liuyutian/TCRPPO/data/test_peptides"
ergo_model_dir: "tcrppo_v2/ERGO/models"
ergo_ae_file: "tcrppo_v2/ERGO/TCR_Autoencoder/tcr_ae_dim_100.pt"
output_dir: "output"
results_dir: "results"
l1_seeds_dir: "data/l1_seeds"

# === Training Targets ===
train_targets: "data/tfold_excellent_peptides.txt"
