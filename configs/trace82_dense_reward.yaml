# trace82: Dense reward signal to fix value function learning
#
# ROOT CAUSE from trace81:
#   - terminal_reward_only=true causes sparse signal
#   - Value function can't learn (VF loss 0.6-2.1, stays high)
#   - Without good value estimates, advantage is wrong
#   - Wrong advantage → weak policy gradient → no learning
#   - KL=0.001-0.004, Clip=0.01-0.08, PG=-0.007 to -0.028 (all too small)
#
# FIXES:
#   1. terminal_reward_only: false → dense reward every step
#   2. learning_rate: 3e-5 (lower for stability)
#   3. vf_coef: 1.0 (higher weight on value function learning)
#   4. Keep use_delta_reward: true (this fix is working)
#
# Expected outcome:
#   - VF loss should decrease over training
#   - KL should be in 0.01-0.05 range (policy actually updating)
#   - Clip fraction should be 0.1-0.3 (meaningful updates)
#   - PG loss should be larger (stronger gradient signal)
#   - Mean reward should trend upward

total_timesteps: 2_000_000
n_envs: 8
n_steps: 32
batch_size: 256
n_epochs: 4
learning_rate: 3.0e-5  # Lower for stability
gamma: 0.98
gae_lambda: 0.95
clip_range: 0.2
entropy_coef: 0.020
vf_coef: 1.0  # Higher weight on value function
max_grad_norm: 0.5

max_tcr_len: 20
min_tcr_len: 8
max_pep_len: 25
max_steps_per_episode: 8
max_steps: 8
hla_pseudoseq_len: 34
ban_stop: true
terminal_reward_only: false  # DENSE REWARD - every step gets signal
active_clipping: false
include_state_scalars: true
pmhc_transform: "none"

hidden_dim: 512
esm_model: "esm2_t33_650M_UR50D"
esm_frozen: true
esm_device: "cuda:0"
esm_tcr_cache_size: 4096
encoder: "esm2"

reward_mode: "v2_simple_target_gated_decoy"
use_delta_reward: true  # Keep this - it's working correctly
w_affinity: 1.0
w_decoy: 0.3
w_naturalness: 0.05
w_diversity: 0.02

# Curriculum gate schedule
gate_schedule:
  0: -3.0
  50000: -2.5
  100000: -2.0
  200000: -1.5
  400000: -1.0
  800000: -0.5

target_affinity_gate: -3.0
target_affinity_bonus: 1.0
decoy_affinity_penalty_weight: 0.3

affinity_model: "tfold"
tfold_server_socket: "/tmp/tfold_server_trace82.sock"
tfold_cache_path: "data/tfold_feature_cache.db"

decoy_K: 2
n_contrast_decoys: 0
contrastive_agg: "mean"
decoy_tau: 10.0
decoy_tier_weights: {A: 0, B: 0, D: 0, C: 0}
decoy_unlock_schedule: {}
decoy_difficulty: "easy"
decoy_difficulty_schedule: {}

naturalness_threshold_zscore: -2.0
cdr3_ppl_stats: "data/cdr3_ppl_stats.json"
diversity_buffer_size: 512
diversity_similarity_threshold: 0.85

l0_mutation_range: [3, 5]
l1_top_k: 500
curriculum_schedule:
  - {until: null, L0: 0.0, L1: 0.0, L2: 1.0}

# Online pool - start from beginning
online_tcr_pool_enabled: true
online_tcr_pool_start_step: 0
online_tcr_pool_warmup_steps: 100
online_tcr_pool_max_ratio: 0.7
online_tcr_pool_max_per_target: 256
online_tcr_pool_min_affinity: -10.0
online_tcr_pool_max_decoy_violation: 999.0
online_tcr_pool_min_hamming: 2
online_tcr_pool_mutate_prob: 0.0

online_tcr_pool_use_dynamic_bands: true
online_tcr_pool_recent_window: 50

target_sampling: "uniform"
train_targets: "data/trace79_curated_targets.txt"

eval_interval: 999999999
eval_n_tcrs: 5
eval_n_decoys: 0
eval_abort_threshold: 0.40
eval_warmup: 500000

checkpoint_interval: 20000
milestones: [50000, 100000, 200000, 400000, 800000, 1000000, 1500000, 2000000]
