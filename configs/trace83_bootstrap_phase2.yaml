# trace83: Bootstrap + Two-phase training - Phase 2
#
# Strategy: 从Phase 1的checkpoint继续，加入specificity约束
# Goal: 保持mean affinity > 0，同时AUROC > 0.65
# Duration: 500K steps (total 1M)

total_timesteps: 500_000
n_envs: 8
n_steps: 32
batch_size: 256
n_epochs: 4
learning_rate: 0.00015  # 降低到trace72水平，稳定优化
gamma: 0.98
gae_lambda: 0.95
clip_range: 0.2
entropy_coef: 0.012  # 降低到trace72水平
vf_coef: 0.5
max_grad_norm: 0.5

max_tcr_len: 20
min_tcr_len: 8
max_pep_len: 25
max_steps_per_episode: 8
max_steps: 8
hla_pseudoseq_len: 34
ban_stop: true
terminal_reward_only: false

hidden_dim: 512
esm_model: "esm2_t33_650M_UR50D"
esm_frozen: true
esm_device: "cuda"
esm_tcr_cache_size: 4096
encoder: "esm2"

# Reward: Phase 2 - 平衡affinity和specificity
reward_mode: "v2_simple_target_gated_decoy"
use_delta_reward: true
w_affinity: 1.0  # 恢复到trace72水平
w_decoy: 0.8     # 恢复到trace72水平
w_naturalness: 0.05
w_diversity: 0.02

# Gate settings - 恢复trace72的设置
target_decoy_gate_logit: -1.5
target_affinity_gate: -0.5
target_affinity_bonus: 1.0
decoy_affinity_penalty_weight: 0.5

affinity_model: "tfold"
affinity_scorer: "tfold"
tfold_server_socket: "/tmp/tfold_server_trace83_phase2.sock"
tfold_cache_path: "data/tfold_feature_cache_trace83_phase2.db"

# Decoy settings - Phase 2使用完整的decoy curriculum
decoy_K: 2
n_contrast_decoys: 2
contrastive_agg: "logsumexp"
decoy_tau: 10.0
decoy_tier_weights: {A: 3, B: 3, D: 2, C: 1}
decoy_unlock_schedule:
  0: [A, B]
  100000: [D]
  200000: [C]
decoy_difficulty: "medium"

naturalness_threshold_zscore: -2.0
cdr3_ppl_stats: "data/cdr3_ppl_stats.json"
diversity_buffer_size: 512
diversity_similarity_threshold: 0.85

# Curriculum: 继续使用bootstrap seeds
l0_mutation_range: [3, 5]
l1_top_k: 500
curriculum_schedule:
  - {until: null, L0: 1.0, L1: 0.0, L2: 0.0}

l0_seeds_dir: "data/l0_seeds_trace72_bootstrap"

target_sampling: "uniform"
train_targets: "data/tfold_excellent_peptides.txt"

eval_interval: 100000
eval_n_tcrs: 50
eval_n_decoys: 50
eval_abort_threshold: 0.40
eval_warmup: 500000

checkpoint_interval: 20000
latest_checkpoint_interval: 2000
milestones: [100000, 200000, 300000, 400000, 500000]

use_znorm: true
znorm_clip: 3.0
