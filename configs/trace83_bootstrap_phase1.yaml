# trace83: Bootstrap + Two-phase training - Phase 1
#
# Strategy: 用trace72的高affinity TCR作为L0 seeds，Phase 1全力优化affinity
# Goal: Mean affinity > 0 (不考虑specificity)
# Duration: 500K steps

total_timesteps: 500_000
n_envs: 8
n_steps: 32
batch_size: 256
n_epochs: 4
learning_rate: 0.0002  # 比trace72略高，鼓励从好起点继续探索
gamma: 0.98
gae_lambda: 0.95
clip_range: 0.2
entropy_coef: 0.015  # 比trace72略高（0.012 → 0.015），适度探索
vf_coef: 0.5
max_grad_norm: 0.5

max_tcr_len: 20
min_tcr_len: 8
max_pep_len: 25
max_steps_per_episode: 8
max_steps: 8
hla_pseudoseq_len: 34
ban_stop: true
terminal_reward_only: false

hidden_dim: 512
esm_model: "esm2_t33_650M_UR50D"
esm_frozen: true
esm_device: "cuda"
esm_tcr_cache_size: 4096
encoder: "esm2"

# Reward: Phase 1 - 几乎只优化affinity
reward_mode: "v2_simple_target_gated_decoy"
use_delta_reward: true
w_affinity: 2.0  # 大幅提高affinity权重
w_decoy: 0.1     # 几乎忽略decoy（Phase 2再加回来）
w_naturalness: 0.05
w_diversity: 0.02

# Gate settings - 放松约束，让affinity优化更自由
target_decoy_gate_logit: -2.0  # 比trace72更宽松（-1.5 → -2.0）
target_affinity_gate: -1.0     # 比trace72更宽松（-0.5 → -1.0）
target_affinity_bonus: 0.5     # 降低bonus，避免trace80的问题
decoy_affinity_penalty_weight: 0.3

affinity_model: "tfold"
affinity_scorer: "tfold"
tfold_server_socket: "/tmp/tfold_server_trace83_phase1.sock"
tfold_cache_path: "data/tfold_feature_cache.db"

# Decoy settings - Phase 1只用最简单的decoy
decoy_K: 2
n_contrast_decoys: 2
contrastive_agg: "logsumexp"
decoy_tau: 10.0
decoy_tier_weights: {A: 1, B: 0, D: 0, C: 0}  # 只用tier A
decoy_unlock_schedule:
  0: [A]
decoy_difficulty: "easy"

naturalness_threshold_zscore: -2.0
cdr3_ppl_stats: "data/cdr3_ppl_stats.json"
diversity_buffer_size: 512
diversity_similarity_threshold: 0.85

# Curriculum: 100% L0 bootstrap seeds
l0_mutation_range: [3, 5]
l1_top_k: 500
curriculum_schedule:
  - {until: null, L0: 1.0, L1: 0.0, L2: 0.0}  # 全部用bootstrap seeds

# 使用bootstrap seeds
l0_seeds_dir: "data/l0_seeds_trace72_bootstrap"

target_sampling: "uniform"
train_targets: "data/tfold_excellent_peptides.txt"

eval_interval: 100000
eval_n_tcrs: 50
eval_n_decoys: 50
eval_abort_threshold: 0.40
eval_warmup: 500000

checkpoint_interval: 20000
latest_checkpoint_interval: 2000
milestones: [100000, 200000, 300000, 400000, 500000]

use_znorm: true
znorm_clip: 3.0
