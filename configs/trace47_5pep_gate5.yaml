# trace47: 5 peptides with lowered gate threshold (-5.0)
#
# Hypothesis: trace45 failed because only 2.5% samples reached Phase 2 (affinity >= -2.0)
# Solution: Lower gate to -5.0 so ~11% samples can benefit from decoy penalty
#
# Changes from standard config:
#   - train_targets: top 5 peptides
#   - target_decoy_gate_logit: -5.0 (was -2.0)

# === PPO ===
total_timesteps: 2_000_000
n_envs: 8
n_steps: 32
batch_size: 256
n_epochs: 4
learning_rate: 1.5e-4
gamma: 0.99
gae_lambda: 0.95
clip_range: 0.2
clip_range_vf: null
ent_coef: 0.012
vf_coef: 0.5
max_grad_norm: 0.5
target_kl: null

# === Policy ===
hidden_dim: 512
encoder: esm2

# === Environment ===
max_steps: 8
ban_stop: true
terminal_reward_only: true
active_clipping: false

# === Reward ===
reward_mode: v2_simple_target_gated_decoy
w_affinity: 1.0
w_decoy: 0.3
w_naturalness: 0.05
w_diversity: 0.02

# NEW: Lowered gate threshold
target_decoy_gate_logit: -5.0

# === Affinity Scorer ===
affinity_scorer: tfold
tfold_use_cache: true

# === Decoy ===
n_contrast_decoys: 2
decoy_library_path: /share/liuyutian/pMHC_decoy_library

# === Training Targets ===
train_targets: data/top5_peptides_v2.txt
tfold_cache_path: data/tfold_feature_cache_trace47_5pep_gate5.db
