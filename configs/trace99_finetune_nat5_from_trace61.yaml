# trace99: Resume trace61 ckpt and apply trace98's high-naturalness recipe
#
# Goal: trace61 already reaches lots of A≥0 but with poor naturalness.
# Here we resume from trace61 and crank w_naturalness to 5.0 (AE+GMM) to see
# whether the policy can keep its A≥0 capability while learning natural CDR3s.
#
# Differences vs trace98 (which was scratch with the same recipe):
#   - Resume from output/trace61_fp32_restart/checkpoints/latest.pt
#   - online pool already warmed (start_step: 0, warmup_steps: 1)
#   - dedicated sockets / cache paths
#
# IMPORTANT: trace61 was trained WITHOUT biochem features (use_biochem_features=false).
# To stay compatible with the resumed checkpoint we MUST keep use_biochem_features=false
# (trace98 had it true, but that would change obs_dim and break the resume).

total_timesteps: 2_000_000
n_envs: 8
n_steps: 32
batch_size: 256
n_epochs: 4
learning_rate: 1.5e-4
gamma: 0.98
gae_lambda: 0.95
clip_range: 0.2
entropy_coef: 0.012
vf_coef: 0.5
max_grad_norm: 0.5

max_tcr_len: 20
min_tcr_len: 8
max_pep_len: 25
max_steps_per_episode: 8
max_steps: 8
hla_pseudoseq_len: 34
ban_stop: true
terminal_reward_only: true
use_biochem_features: false  # MUST match trace61 ckpt to preserve obs_dim

# trace61 ckpt was trained with the legacy 2 state-scalar tail
# (remaining_steps_norm, cumulative_delta) and max_tcr_len=20.
# We MUST keep these to load its policy state_dict.
include_state_scalars: true

hidden_dim: 512
esm_model: "esm2_t33_650M_UR50D"
esm_frozen: true
esm_device: "cuda"
esm_tcr_cache_size: 4096
encoder: "esm2"

# Reward mode — same family as trace61/trace94/trace98
reward_mode: "v2_simple_target_gated_decoy"
use_delta_reward: false

# ====== THE EXPERIMENT KNOB ======
# Crank naturalness weight to 5.0 (trace61 used 0.05, trace94 used 0.15, trace98 used 5.0)
w_affinity: 1.0
w_decoy: 0.3
w_naturalness: 5.0
w_diversity: 0.02
# ==================================

# Gate raised to 0.0 + bonus (same as trace94 / trace98 — slightly different from
# trace61 which used target_affinity_gate=-0.5 / bonus=1.0)
target_decoy_gate_logit: 0.0
target_pass_bonus: 2.0
decoy_affinity_penalty_weight: 0.3

# Backward-compat keys (trace61 used these names)
target_affinity_gate: 0.0
target_affinity_bonus: 2.0

# FP32 tFold
affinity_model: "tfold"
tfold_server_socket: "/tmp/tfold_server_trace99.sock"
tfold_cache_path: "data/tfold_cache_trace99.db"

# Decoy settings — match trace94/trace98 (tiers A+B active)
decoy_K: 2
n_contrast_decoys: 0
contrastive_agg: "mean"
decoy_tau: 10.0
decoy_tier_weights: {A: 1, B: 1, D: 0, C: 0}
decoy_unlock_schedule: {}
decoy_difficulty: "easy"
decoy_difficulty_schedule: {}

# ====== Naturalness gate DISABLED ======
# Rely on high w_naturalness=5.0 instead of hard gating
naturalness_gate_affinity: false
naturalness_gate_threshold: 0.0

# Naturalness — AE+GMM scorer
naturalness_scorer_type: "ae_gmm"
naturalness_threshold_zscore: -2.0
cdr3_ppl_stats: "data/cdr3_ppl_stats.json"
naturalness_ae_model: "/share/liuyutian/TCRPPO/code/reward/ae_model"
naturalness_gmm_model: "/share/liuyutian/TCRPPO/code/reward/gmm.pkl"
naturalness_blosum: "/share/liuyutian/TCRPPO/code/blosum.txt"
naturalness_ae_threshold: 0.8

# Diversity (same as trace61/94/98)
diversity_buffer_size: 512
diversity_similarity_threshold: 0.85

# Pure L2 base (same as trace61/94)
l0_mutation_range: [3, 5]
l1_top_k: 500
curriculum_schedule:
  - {until: null, L0: 0.0, L1: 0.0, L2: 1.0}

# Online pool — already warm from trace61, so skip warmup
online_tcr_pool_enabled: true
online_tcr_pool_start_step: 0
online_tcr_pool_warmup_steps: 1
online_tcr_pool_max_ratio: 0.5
online_tcr_pool_max_per_target: 256
online_tcr_pool_min_affinity: -10.0
online_tcr_pool_max_decoy_violation: 999.0
online_tcr_pool_min_hamming: 2
online_tcr_pool_mutate_prob: 0.0
online_tcr_pool_use_dynamic_bands: true
online_tcr_pool_recent_window: 50

target_sampling: "uniform"
train_targets: "data/tfold_excellent_peptides.txt"

eval_interval: 100000
eval_n_tcrs: 5
eval_n_decoys: 0
eval_abort_threshold: 0.40
eval_warmup: 100000

checkpoint_interval: 20000
latest_checkpoint_interval: 2000
milestones: [100000, 200000, 300000, 400000, 500000, 600000, 700000, 800000,
  900000, 1000000, 1200000, 1400000, 1600000, 1800000, 2000000]

use_znorm: false
