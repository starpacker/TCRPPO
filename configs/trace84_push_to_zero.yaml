# trace84: Push to Mean A = 0.0
#
# STRATEGY:
#   1. Resume from trace73 checkpoint (proven base)
#   2. Conservative gate schedule (stay at -2.0 longer)
#   3. Enable decoy penalty gradually (specificity)
#   4. Use L0/L1 curriculum (start from good TCRs)
#   5. Longer training (2M steps)
#
# Expected outcome:
#   - Mean A should reach 0.0 within 500K-1M steps
#   - Maintain specificity via decoy penalty
#   - Avoid catastrophic forgetting via conservative gate

total_timesteps: 2_000_000
n_envs: 8
n_steps: 32
batch_size: 256
n_epochs: 4
learning_rate: 1.2e-4
gamma: 0.98
gae_lambda: 0.95
clip_range: 0.2
entropy_coef: 0.020
vf_coef: 0.5
max_grad_norm: 0.5

max_tcr_len: 20
min_tcr_len: 8
max_pep_len: 25
max_steps_per_episode: 8
max_steps: 8
hla_pseudoseq_len: 34
ban_stop: true
terminal_reward_only: true

hidden_dim: 512
esm_model: "esm2_t33_650M_UR50D"
esm_frozen: true
esm_device: "cuda:1"
esm_tcr_cache_size: 4096
encoder: "esm2"

reward_mode: "v2_simple_target_gated_decoy"
use_delta_reward: true
w_affinity: 1.0
w_decoy: 0.3
w_naturalness: 0.05
w_diversity: 0.02

# CONSERVATIVE gate schedule: stay at -2.0 longer, then slowly push to 0.0
gate_schedule:
  0: -2.0          # Start at -2.0 (trace73 was here)
  200000: -1.5     # After 200K, push to -1.5
  500000: -1.0     # After 500K, push to -1.0
  1000000: -0.5    # After 1M, push to -0.5
  1500000: 0.0     # After 1.5M, push to 0.0 (target!)

target_affinity_gate: -2.0
target_affinity_bonus: 1.0
decoy_affinity_penalty_weight: 0.3

affinity_model: "tfold"
tfold_server_socket: "/tmp/tfold_server_trace84.sock"
tfold_cache_path: "data/tfold_feature_cache.db"

# Enable decoy penalty gradually
decoy_K: 8  # More decoys for better specificity signal
n_contrast_decoys: 0
contrastive_agg: "mean"
decoy_tau: 10.0

# Gradual decoy unlock (start easy, get harder)
decoy_tier_weights: {A: 3, B: 3, D: 2, C: 1}  # Standard tier weights
decoy_unlock_schedule:
  0: ["D"]           # Start with known binders only
  100000: ["D", "A"] # Add point mutants
  300000: ["D", "A", "B"]  # Add 2-3 AA mutants
  600000: ["D", "A", "B", "C"]  # Add unrelated peptides

decoy_difficulty: "easy"
decoy_difficulty_schedule: {}

naturalness_threshold_zscore: -2.0
cdr3_ppl_stats: "data/cdr3_ppl_stats.json"
diversity_buffer_size: 512
diversity_similarity_threshold: 0.85

l0_mutation_range: [3, 5]
l1_top_k: 500

# CURRICULUM: Start from good TCRs, gradually add random
curriculum_schedule:
  - {until: 100000, L0: 0.5, L1: 0.3, L2: 0.2}   # Early: 50% known binders
  - {until: 500000, L0: 0.3, L1: 0.3, L2: 0.4}   # Mid: balanced
  - {until: null, L0: 0.1, L1: 0.2, L2: 0.7}     # Late: mostly random

# Online pool: collect good TCRs during training
online_tcr_pool_enabled: true
online_tcr_pool_start_step: 0
online_tcr_pool_warmup_steps: 100
online_tcr_pool_max_ratio: 0.7
online_tcr_pool_max_per_target: 256
online_tcr_pool_min_affinity: -1.0  # Only keep good TCRs
online_tcr_pool_max_decoy_violation: 2.0  # Enforce specificity
online_tcr_pool_min_hamming: 2
online_tcr_pool_mutate_prob: 0.0

online_tcr_pool_use_dynamic_bands: true
online_tcr_pool_recent_window: 50

target_sampling: "uniform"
train_targets: "data/trace79_curated_targets.txt"  # 10 curated targets

eval_interval: 999999999
eval_n_tcrs: 5
eval_n_decoys: 0
eval_abort_threshold: 0.40
eval_warmup: 500000

checkpoint_interval: 10000
milestones: [100000, 200000, 500000, 1000000, 1500000, 2000000]
