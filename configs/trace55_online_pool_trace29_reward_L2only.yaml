# Online per-peptide TCR seed pool strategy.
#
# Base: absolute target-affinity-only terminal tFold reward with L2-only initial TCRs.
# Strategy:
#   - Start from pure L2.
#   - Store high-FinalA final TCRs into per-peptide online pools.
#   - Gradually sample from the matching peptide's online pool as training progresses.
#   - Ignore decoy specificity for this trace; success means target affinity reaches 0.6.

total_timesteps: 2_000_000
n_envs: 8
n_steps: 32
batch_size: 256
n_epochs: 4
learning_rate: 1.5e-4
gamma: 0.98
gae_lambda: 0.95
clip_range: 0.2
entropy_coef: 0.012
vf_coef: 0.5
max_grad_norm: 0.5

max_tcr_len: 20
min_tcr_len: 8
max_pep_len: 25
max_steps_per_episode: 8
max_steps: 8
hla_pseudoseq_len: 34
ban_stop: true
terminal_reward_only: true

hidden_dim: 512
esm_model: "esm2_t33_650M_UR50D"
esm_frozen: true
esm_device: "cuda"
esm_tcr_cache_size: 4096
encoder: "esm2"

reward_mode: "v2_no_decoy"
use_delta_reward: false
w_affinity: 1.0
w_decoy: 0.0
w_naturalness: 0.0
w_diversity: 0.0

target_affinity_goal: 0.6

affinity_model: "tfold"
tfold_server_socket: "/tmp/tfold_server_trace55_online_pool_target_only_fastpool_L2only.sock"
tfold_cache_path: "data/tfold_feature_cache_trace55_online_pool_target_only_fastpool_L2only.db"

# Decoys disabled for this target-affinity-only experiment.
decoy_K: 0
n_contrast_decoys: 0
contrastive_agg: "mean"
decoy_tau: 10.0
decoy_tier_weights: {A: 0, B: 0, D: 0, C: 0}
decoy_unlock_schedule: {}
decoy_difficulty: "easy"
decoy_difficulty_schedule: {}

naturalness_threshold_zscore: -2.0
cdr3_ppl_stats: "data/cdr3_ppl_stats.json"
diversity_buffer_size: 512
diversity_similarity_threshold: 0.85

# Pure L2 base sampler. Online pool is mixed in separately below.
l0_mutation_range: [3, 5]
l1_top_k: 500
curriculum_schedule:
  - {until: null, L0: 0.0, L1: 0.0, L2: 1.0}

# Online per-peptide TCR seed pool.
online_tcr_pool_enabled: true
# Resume starts at ~500224, so 502000 is about 2k steps after launch.
online_tcr_pool_start_step: 502000
online_tcr_pool_warmup_steps: 20000
online_tcr_pool_max_ratio: 0.8
online_tcr_pool_max_per_target: 128
online_tcr_pool_min_affinity: -2.0
online_tcr_pool_max_decoy_violation: 999.0
online_tcr_pool_min_hamming: 2
online_tcr_pool_mutate_prob: 0.0

target_sampling: "uniform"
train_targets: "data/tfold_excellent_peptides.txt"

eval_interval: 999999999
eval_n_tcrs: 5
eval_n_decoys: 0
eval_abort_threshold: 0.40
eval_warmup: 500000

checkpoint_interval: 20000
latest_checkpoint_interval: 2000
milestones: [520000, 540000, 560000, 580000, 600000, 620000, 640000, 660000,
  680000, 700000, 720000, 740000, 760000, 780000, 800000, 900000, 1000000,
  1200000, 1400000, 1600000, 1800000, 2000000]

use_znorm: false
norm_window: 10000
norm_warmup: 1000
seed: 42

decoy_library_path: "/share/liuyutian/pMHC_decoy_library"
tcrdb_path: "/share/liuyutian/TCRPPO/data/tcrdb"
test_peptides_path: "/share/liuyutian/TCRPPO/data/test_peptides"
ergo_model_dir: "tcrppo_v2/ERGO/models"
ergo_ae_file: "tcrppo_v2/ERGO/TCR_Autoencoder/tcr_ae_dim_100.pt"
output_dir: "output"
results_dir: "results"
