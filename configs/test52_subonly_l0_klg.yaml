# Small local-search sanity test:
# - single peptide KLGGALQAK
# - true L0 seeds only, no pre-mutation
# - 2-3 substitution edits only
# - terminal tFold delta reward with an absolute logit anchor

total_timesteps: 2048
n_envs: 4
n_steps: 32
batch_size: 128
n_epochs: 4
learning_rate: 2.0e-4
gamma: 0.98
gae_lambda: 0.95
clip_range: 0.2
entropy_coef: 0.01
vf_coef: 0.5
max_grad_norm: 0.5

max_tcr_len: 20
min_tcr_len: 8
max_steps: 3
min_steps: 2
ban_stop: false
sub_only: true
terminal_reward_only: true

hidden_dim: 512
encoder: esm2
esm_tcr_cache_size: 4096

reward_mode: tfold_delta_calibrated
affinity_model: tfold
w_affinity: 1.0
w_decoy: 0.0
w_naturalness: 0.0
w_diversity: 0.0
w_absolute_affinity: 0.5
affinity_ref_logit: -6.0
n_contrast_decoys: 0

l0_mutation_range: [0, 0]
l1_top_k: 500
curriculum_schedule:
  - {until: null, L0: 1.0, L1: 0.0, L2: 0.0}

train_targets: KLGGALQAK
target_sampling: uniform

tfold_server_socket: /tmp/tfold_server_test52_subonly_l0_klg_2to3edit.sock
tfold_cache_path: data/tfold_feature_cache_test52b_subonly_l0_klg.db
tfold_use_cache: true

latest_checkpoint_interval: 512
checkpoint_interval: 2048
milestones: [2048]

eval_interval: 999999999
eval_warmup: 500000

seed: 42
decoy_library_path: /share/liuyutian/pMHC_decoy_library
tcrdb_path: /share/liuyutian/TCRPPO/data/tcrdb
output_dir: output
results_dir: results
