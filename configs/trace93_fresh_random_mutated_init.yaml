# trace93: Fresh start - random-mutated TCRdb high-affinity TCRs, terminal absolute affinity
#
# Key design:
# 1. Initial TCRs: L0 only = randomly mutated (3-8 positions) high-affinity TCRs from TCRdb
# 2. No online TCR pool
# 3. ban_stop: false - STOP is part of action space (SUB/DEL/INS/STOP)
# 4. max_steps=8, min_steps=4 (must take 4-8 actions before STOP allowed)
# 5. Reward: terminal-only absolute affinity via tFold AMP server
# 6. 20 peptides (all with TCRdb high-affinity seeds)

total_timesteps: 2_000_000
n_envs: 32
n_steps: 128
batch_size: 4096
n_epochs: 4
learning_rate: 7.5e-5
gamma: 0.98
gae_lambda: 0.95
clip_range: 0.2
entropy_coef: 0.005
vf_coef: 0.5
max_grad_norm: 0.5

max_tcr_len: 20
min_tcr_len: 8
max_pep_len: 25
max_steps_per_episode: 8
max_steps: 8
min_steps: 4
hla_pseudoseq_len: 34
ban_stop: true
sub_only: false
terminal_reward_only: true

hidden_dim: 512
esm_model: "esm2_t33_650M_UR50D"
esm_frozen: true
esm_device: "cuda"
esm_tcr_cache_size: 4096
encoder: "esm2"

# Terminal absolute affinity reward:
# v2_simple_target_gated_decoy with use_delta_reward=false, pass_bonus=0, decoy=0
# → reward = w_affinity * aff_score (raw tFold logit at terminal step)
reward_mode: "v2_simple_target_gated_decoy"
use_delta_reward: false
w_affinity: 1.0
w_delta_affinity: 0.0
w_decoy: 0.0
w_naturalness: 0.05
w_diversity: 0.02

# No gate bonus (pure absolute affinity, no threshold)
target_decoy_gate_logit: -999.0
target_pass_bonus: 0.0
decoy_affinity_center: -3.0
decoy_fixed_tiers: []
decoy_k_per_tier: 0

target_affinity_gate: -999.0
target_affinity_bonus: 0.0
decoy_affinity_penalty_weight: 0.0

affinity_model: "tfold"
tfold_server_socket: "/tmp/tfold_server_trace93.sock"
tfold_cache_path: "data/tfold_feature_cache_trace43_20pep.db"

# No decoy scoring
decoy_K: 0
n_contrast_decoys: 0
contrastive_agg: "mean"
decoy_tau: 10.0
decoy_tier_weights: {A: 0, B: 0, D: 0, C: 0}
decoy_unlock_schedule: {}
decoy_difficulty: "easy"
decoy_difficulty_schedule: {}

naturalness_threshold_zscore: -2.0
cdr3_ppl_stats: "data/cdr3_ppl_stats.json"
diversity_buffer_size: 512
diversity_similarity_threshold: 0.85

# 100% L0: random-mutated TCRdb high-affinity seeds (3-8 mutations)
l0_mutation_range: [3, 5]
l0_seeds_dir: "data/l0_seeds_trace93"
l1_top_k: 500
curriculum_schedule:
  - {until: null, L0: 1.0, L1: 0.0, L2: 0.0}

# No online TCR pool
online_tcr_pool_enabled: false
online_tcr_pool_start_step: 0
online_tcr_pool_warmup_steps: 1
online_tcr_pool_max_ratio: 0.0
online_tcr_pool_max_per_target: 0
online_tcr_pool_min_affinity: -10.0
online_tcr_pool_max_decoy_violation: 999.0
online_tcr_pool_min_hamming: 0
online_tcr_pool_mutate_prob: 0.0
online_tcr_pool_use_dynamic_bands: false
online_tcr_pool_recent_window: 0

target_sampling: "uniform"
train_targets: "data/trace93_20_peptides.txt"

eval_interval: 999999999
eval_n_tcrs: 5
eval_n_decoys: 0
eval_abort_threshold: 0.40
eval_warmup: 500000

checkpoint_interval: 20000
