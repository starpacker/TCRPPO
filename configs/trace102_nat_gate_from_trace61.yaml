# trace102: Naturalness gate from trace61 (clean start)
#
# Strategy: Resume from trace61 instead of trace99, avoiding trace99's extreme affinity bias.
# Use softer naturalness gate threshold (-0.45 vs -0.3) to allow model more room to explore.
#
# Key advantages vs trace100:
#   1. trace61 baseline: more balanced starting point (less affinity-biased than trace99)
#   2. Softer gate (-0.45): less aggressive, easier for model to find solutions
#   3. Lower nat weight (8.0 vs 10.0): gentler guidance
#
# Expected outcome:
#   - Week 1: Nat pass rate 10% -> 40%
#   - Week 2: Nat pass rate -> 55%, Affinity>0 -> 50%
#   - Week 3: Both satisfied -> 35%+

total_timesteps: 1_000_000
n_envs: 8
n_steps: 32
batch_size: 256
n_epochs: 4
learning_rate: 0.00005  # Low LR to prevent forgetting
gamma: 0.98
gae_lambda: 0.95
clip_range: 0.2
entropy_coef: 0.02  # Higher exploration
vf_coef: 0.5
max_grad_norm: 0.5

max_tcr_len: 20
min_tcr_len: 8
max_pep_len: 25
max_steps_per_episode: 8
max_steps: 8
hla_pseudoseq_len: 34
ban_stop: true
terminal_reward_only: true
use_biochem_features: false  # MUST match trace61
include_state_scalars: true  # MUST match trace61

hidden_dim: 512
esm_model: "esm2_t33_650M_UR50D"
esm_frozen: true
esm_device: "cuda"
esm_tcr_cache_size: 4096
encoder: "esm2"

# Same reward mode as trace61
reward_mode: "v2_simple_target_gated_decoy"
use_delta_reward: false

# ====== KEY EXPERIMENT PARAMETERS ======
# Weights - softer than trace100
w_affinity: 1.0
w_decoy: 0.3
w_naturalness: 8.0  # 10.0 -> 8.0 (gentler)
w_diversity: 0.02

# ====== SOFT NATURALNESS GATE ======
naturalness_gate_affinity: true  # ENABLE!
naturalness_gate_threshold: -0.45  # -0.3 -> -0.45 (softer, more permissive)

# Target gate (same as trace99/61)
target_decoy_gate_logit: 0.0
target_pass_bonus: 2.0
decoy_affinity_penalty_weight: 0.3
target_affinity_gate: 0.0
target_affinity_bonus: 2.0

# FP32 tFold
affinity_model: "tfold"
tfold_server_socket: "/tmp/tfold_server_trace102.sock"
tfold_cache_path: "data/tfold_cache_trace102.db"

# Decoy settings
decoy_K: 2
n_contrast_decoys: 0
contrastive_agg: "mean"
decoy_tau: 10.0
decoy_tier_weights: {A: 1, B: 1, D: 0, C: 0}
decoy_unlock_schedule: {}
decoy_difficulty: "easy"
decoy_difficulty_schedule: {}

# Naturalness - AE+GMM scorer
naturalness_scorer_type: "ae_gmm"
naturalness_threshold_zscore: -2.0
cdr3_ppl_stats: "data/cdr3_ppl_stats.json"
naturalness_ae_model: "/share/liuyutian/TCRPPO/code/reward/ae_model"
naturalness_gmm_model: "/share/liuyutian/TCRPPO/code/reward/gmm.pkl"
naturalness_blosum: "/share/liuyutian/TCRPPO/code/blosum.txt"
naturalness_ae_threshold: 0.8

# Diversity
diversity_buffer_size: 512
diversity_similarity_threshold: 0.85

# Pure L2 base
l0_mutation_range: [3, 5]
l1_top_k: 500
curriculum_schedule:
  - {until: null, L0: 0.0, L1: 0.0, L2: 1.0}

# Online pool - start fresh
online_tcr_pool_enabled: true
online_tcr_pool_start_step: 0
online_tcr_pool_warmup_steps: 1
online_tcr_pool_max_ratio: 0.5
online_tcr_pool_max_per_target: 256
online_tcr_pool_min_affinity: -10.0
online_tcr_pool_max_decoy_violation: 999.0
online_tcr_pool_min_hamming: 2
online_tcr_pool_mutate_prob: 0.0
online_tcr_pool_use_dynamic_bands: true
online_tcr_pool_recent_window: 50

target_sampling: "uniform"
train_targets: "data/tfold_excellent_peptides.txt"

eval_interval: 50000
eval_n_tcrs: 10
eval_n_decoys: 5
eval_abort_threshold: 0.40
eval_warmup: 50000

checkpoint_interval: 10000
latest_checkpoint_interval: 2000
milestones: [50000, 100000, 200000, 300000, 400000, 500000, 600000, 700000, 800000, 900000, 1000000]

use_znorm: false
