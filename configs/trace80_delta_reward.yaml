# trace80: Delta reward + lower LR to fix catastrophic forgetting
#
# PROBLEM IDENTIFIED in trace79:
#   - use_delta_reward: false means model only sees final affinity
#   - When InitA=0.244, model changes it to A=-6.794 (DeltaA=-7.04)
#   - No incentive to preserve good initial TCRs → catastrophic forgetting
#   - Performance degraded from mean=-1.490 @ 72eps to mean=-6.348 @ 792eps
#
# SOLUTION:
#   1. use_delta_reward: true → reward improvement, not absolute affinity
#   2. learning_rate: 3e-5 (down from 1.2e-4) → reduce forgetting
#   3. Keep 10 curated targets (proven to work in early trace79)
#   4. Resume from trace73 checkpoint (proven policy)
#
# Expected behavior:
#   - If InitA is good (>0), model learns to preserve or slightly improve
#   - If InitA is bad (<-5), model learns to improve significantly
#   - Delta reward aligns incentives with actual goal

total_timesteps: 2_000_000
n_envs: 8
n_steps: 32
batch_size: 256
n_epochs: 4
learning_rate: 3.0e-5  # Lower than trace73's 1.2e-4 to reduce forgetting
gamma: 0.98
gae_lambda: 0.95
clip_range: 0.2
entropy_coef: 0.020  # Same as trace73 (good exploration)
vf_coef: 0.5
max_grad_norm: 0.5

max_tcr_len: 20
min_tcr_len: 8
max_pep_len: 25
max_steps_per_episode: 8
max_steps: 8
hla_pseudoseq_len: 34
ban_stop: true
terminal_reward_only: true

hidden_dim: 512
esm_model: "esm2_t33_650M_UR50D"
esm_frozen: true
esm_device: "cuda:0"  # GPU 0 has most free memory
esm_tcr_cache_size: 4096
encoder: "esm2"

reward_mode: "v2_simple_target_gated_decoy"
use_delta_reward: true  # ← KEY CHANGE: reward improvement, not absolute value
w_affinity: 1.0
w_decoy: 0.3
w_naturalness: 0.05
w_diversity: 0.02

# Curriculum gate schedule — same proven approach as trace73
gate_schedule:
  644096: -2.0   # Start easy
  670000: -1.5
  700000: -1.0
  750000: -0.5   # Final target

target_affinity_gate: -2.0
target_affinity_bonus: 1.0
decoy_affinity_penalty_weight: 0.3

affinity_model: "tfold"
tfold_server_socket: "/tmp/tfold_server_trace80_delta.sock"
tfold_cache_path: "data/tfold_feature_cache.db"  # Reuse shared cache

decoy_K: 2
n_contrast_decoys: 0
contrastive_agg: "mean"
decoy_tau: 10.0
decoy_tier_weights: {A: 0, B: 0, D: 0, C: 0}
decoy_unlock_schedule: {}
decoy_difficulty: "easy"
decoy_difficulty_schedule: {}

naturalness_threshold_zscore: -2.0
cdr3_ppl_stats: "data/cdr3_ppl_stats.json"
diversity_buffer_size: 512
diversity_similarity_threshold: 0.85

l0_mutation_range: [3, 5]
l1_top_k: 500
curriculum_schedule:
  - {until: null, L0: 0.0, L1: 0.0, L2: 1.0}

# Online pool: same as trace79
online_tcr_pool_enabled: true
online_tcr_pool_start_step: 644096
online_tcr_pool_warmup_steps: 1
online_tcr_pool_max_ratio: 0.7  # Higher than trace73's 0.5 — exploit good seqs more
online_tcr_pool_max_per_target: 256
online_tcr_pool_min_affinity: -10.0  # Same as trace73 — no filter, let pool build
online_tcr_pool_max_decoy_violation: 999.0
online_tcr_pool_min_hamming: 2
online_tcr_pool_mutate_prob: 0.0

online_tcr_pool_use_dynamic_bands: true
online_tcr_pool_recent_window: 50

target_sampling: "uniform"
train_targets: "data/trace79_curated_targets.txt"  # Same 10 curated targets

eval_interval: 999999999
eval_n_tcrs: 5
eval_n_decoys: 0
eval_abort_threshold: 0.40
eval_warmup: 500000

checkpoint_interval: 20000
milestones: [660000, 670000, 680000, 700000, 720000, 750000, 800000, 900000, 1000000, 1200000, 1500000, 2000000]
