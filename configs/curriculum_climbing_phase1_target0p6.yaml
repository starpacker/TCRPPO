# Phase 1: target-only curriculum climbing to A >= 0.6.
#
# Reproducibility anchor:
#   Resume from fixed trace29 checkpoint:
#   output/test62_simple_target_gated_decoy_trace29_simple_target_gated_decoy/checkpoints/milestone_680000.pt
#
# Intent:
#   Do not optimize decoys in this phase. First build a policy that can
#   repeatedly climb target tFold affinity to the binding region.

# === PPO ===
total_timesteps: 2_000_000
n_envs: 8
n_steps: 32
batch_size: 256
n_epochs: 4
learning_rate: 1.5e-4
gamma: 0.98
gae_lambda: 0.95
clip_range: 0.2
entropy_coef: 0.012
vf_coef: 0.5
max_grad_norm: 0.5

# === Environment ===
max_tcr_len: 20
min_tcr_len: 8
max_pep_len: 25
max_steps_per_episode: 8
max_steps: 8
hla_pseudoseq_len: 34
ban_stop: true
terminal_reward_only: true

# === Policy Network ===
hidden_dim: 512

# === ESM State Encoder ===
esm_model: "esm2_t33_650M_UR50D"
esm_frozen: true
esm_device: "cuda"
esm_tcr_cache_size: 4096
encoder: "esm2"

# === Reward Mode ===
reward_mode: "v2_curriculum_climbing"
use_delta_reward: false

# === Reward Weights ===
w_affinity: 2.0
w_gap: 0.0
w_decoy: 0.0
w_naturalness: 0.05
w_diversity: 0.02

# === Target-Only Curriculum Climbing ===
curriculum_gates: [-2.0, -1.0, 0.0, 0.4, 0.6]
curriculum_bonuses: [0.3, 0.8, 1.4, 2.0, 3.0]
gap_margin: 1.0
decoy_activation_threshold: 999.0

# === Decoy Settings Disabled For Phase 1 ===
decoy_fixed_tiers: []
decoy_k_per_tier: 0
decoy_K: 0
n_contrast_decoys: 0
contrastive_agg: "mean"
decoy_tau: 10.0
decoy_tier_weights:
  A: 0
  B: 0
  D: 0
  C: 0
decoy_unlock_schedule:
  0: []
decoy_difficulty: "easy"

# === Affinity Scorer ===
affinity_model: "tfold"
tfold_server_socket: "/tmp/tfold_server_trace51_target0p6_phase1.sock"
tfold_cache_path: "data/tfold_feature_cache_trace51_target0p6_phase1.db"

# === Naturalness Scorer ===
naturalness_threshold_zscore: -2.0
cdr3_ppl_stats: "data/cdr3_ppl_stats.json"

# === Diversity Scorer ===
diversity_buffer_size: 512
diversity_similarity_threshold: 0.85

# === TCR Pool Curriculum ===
l0_mutation_range: [3, 5]
l1_top_k: 500
curriculum_schedule:
  - {until: null, L0: 0.5, L1: 0.0, L2: 0.5}

# === Target Sampling ===
target_sampling: "uniform"
train_targets: "data/tfold_excellent_peptides.txt"

# === Online Eval Disabled ===
eval_interval: 999999999
eval_n_tcrs: 5
eval_n_decoys: 50
eval_abort_threshold: 0.40
eval_warmup: 500000

# === Checkpointing ===
checkpoint_interval: 20000
latest_checkpoint_interval: 2000
milestones: [700000, 720000, 740000, 760000, 780000, 800000, 820000, 840000,
  860000, 880000, 900000, 920000, 940000, 960000, 980000, 1000000, 1100000,
  1200000, 1300000, 1400000, 1500000, 1600000, 1700000, 1800000, 1900000,
  2000000]

# === Normalization Disabled ===
use_znorm: false
norm_window: 10000
norm_warmup: 1000

# === Seed ===
seed: 42

# === Paths ===
decoy_library_path: "/share/liuyutian/pMHC_decoy_library"
tcrdb_path: "/share/liuyutian/TCRPPO/data/tcrdb"
test_peptides_path: "/share/liuyutian/TCRPPO/data/test_peptides"
ergo_model_dir: "tcrppo_v2/ERGO/models"
ergo_ae_file: "tcrppo_v2/ERGO/TCR_Autoencoder/tcr_ae_dim_100.pt"
output_dir: "output"
results_dir: "results"
