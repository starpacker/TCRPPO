# trace90: Single peptide (LLLDRLNQL) from trace61 - target-decoy focused
#
# Base: trace61_dynamic_pool latest checkpoint (global_step=~650k)
# Key features:
#   - Single peptide: LLLDRLNQL (best performer in trace72)
#   - Same reward mode as trace61: v2_simple_target_gated_decoy
#   - Active clipping enabled
#   - Best TCR tracking
# Goal: Find TCRs with high target affinity AND low decoy affinity

total_timesteps: 2_000_000
n_envs: 8
n_steps: 32
batch_size: 256
n_epochs: 4
learning_rate: 1.5e-4
gamma: 0.98
gae_lambda: 0.95
clip_range: 0.2
entropy_coef: 0.012
vf_coef: 0.5
max_grad_norm: 0.5

max_tcr_len: 20
min_tcr_len: 8
max_pep_len: 25
max_steps_per_episode: 8
max_steps: 8
hla_pseudoseq_len: 34
ban_stop: true
terminal_reward_only: true

hidden_dim: 512
esm_model: "esm2_t33_650M_UR50D"
esm_frozen: true
esm_device: "cuda"
esm_tcr_cache_size: 4096
encoder: "esm2"

# Same reward mode as trace61
reward_mode: "v2_simple_target_gated_decoy"
use_delta_reward: true
w_affinity: 1.0
w_delta_affinity: 1.0
w_decoy: 0.3
w_naturalness: 0.05
w_diversity: 0.02

# Gate settings (same as trace61)
target_decoy_gate_logit: -0.8
target_pass_bonus: 1.0
decoy_affinity_center: -3.0
decoy_fixed_tiers: ["A", "B", "D", "C"]
decoy_k_per_tier: 2

# Compatibility
target_affinity_gate: -0.8
target_affinity_bonus: 1.0
decoy_affinity_penalty_weight: 0.3

affinity_model: "tfold"
tfold_server_socket: "/tmp/tfold_server_trace90_single_peptide.sock"
tfold_cache_path: "data/tfold_feature_cache_trace90_single_peptide.db"

decoy_K: 8
n_contrast_decoys: 8
contrastive_agg: "mean"
decoy_tau: 10.0
decoy_tier_weights: {A: 3, B: 3, D: 2, C: 1}
decoy_unlock_schedule: {}
decoy_difficulty: "easy"
decoy_difficulty_schedule: {}

naturalness_threshold_zscore: -2.0
cdr3_ppl_stats: "data/cdr3_ppl_stats.json"
diversity_buffer_size: 512
diversity_similarity_threshold: 0.85

l0_mutation_range: [3, 5]
l1_top_k: 500
curriculum_schedule:
  - {until: null, L0: 0.0, L1: 0.0, L2: 1.0}

online_tcr_pool_enabled: true
online_tcr_pool_start_step: 650000
online_tcr_pool_warmup_steps: 1
online_tcr_pool_max_ratio: 0.5
online_tcr_pool_max_per_target: 256
online_tcr_pool_min_affinity: -10.0
online_tcr_pool_max_decoy_violation: 999.0
online_tcr_pool_min_hamming: 2
online_tcr_pool_mutate_prob: 0.0

online_tcr_pool_use_dynamic_bands: true
online_tcr_pool_recent_window: 50

target_sampling: "uniform"
train_targets: "data/single_peptide_LLLDRLNQL.txt"

eval_interval: 999999999
eval_n_tcrs: 5
eval_n_decoys: 0
eval_abort_threshold: 0.40
eval_warmup: 500000

checkpoint_interval: 20000

# Active clipping
active_clipping: true
active_clipping_threshold: 0.02

# Best TCR tracking
best_tcr_log_path: "data/trace90_best_tcrs.txt"
best_tcr_min_affinity: -0.5
best_tcr_max_decoy_violation: 1.0
