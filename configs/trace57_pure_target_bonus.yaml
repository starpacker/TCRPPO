# trace57: Pure Target with Multi-Tier Bonus + Online Pool + pMHC Centering
#
# Key Differences from trace56:
#   1. **pMHC Embedding Centering**: pmhc_embedding_transform="center" (trace56 没有)
#   2. **Large Bonuses**: [10, 15, 20, 30, 50] vs trace56's [0.5, 1.5, 2.8, 4.2, 5.2, 6.3, 7.0, 8.0]
#   3. **Fewer Gates**: 5 gates vs trace56's 8 gates
#
# Reward Mode: v2_curriculum_climbing
# 
# Reward Formula:
#   R = 1.0 * A + bonus(A) + 0.05*Nat + 0.02*Div
#
# Bonus Tiers (累积式):
#   A >= -2.0:  bonus = 10.0
#   A >= -1.0:  bonus = 15.0  (10 + 5)
#   A >= -0.5:  bonus = 20.0  (10 + 5 + 5)
#   A >= 0.0:   bonus = 30.0  (10 + 5 + 5 + 10)
#   A >= 0.6:   bonus = 50.0  (10 + 5 + 5 + 10 + 20)
#
# Resume from trace11 @ 500K checkpoint

# === PPO ===
total_timesteps: 2_000_000
n_envs: 8
n_steps: 32
batch_size: 256
n_epochs: 4
learning_rate: 1.5e-4  # 降低 LR，从 checkpoint 恢复
gamma: 0.98
gae_lambda: 0.95
clip_range: 0.2
entropy_coef: 0.02  # 降低 entropy，鼓励 exploitation
vf_coef: 0.5
max_grad_norm: 0.5

# === Environment ===
max_tcr_len: 20
min_tcr_len: 8
max_pep_len: 25
max_steps_per_episode: 8
max_steps: 8
hla_pseudoseq_len: 34
ban_stop: true
terminal_reward_only: true

# === Policy Network ===
hidden_dim: 512

# === ESM State Encoder ===
esm_model: "esm2_t33_650M_UR50D"
esm_frozen: true
esm_device: "cuda"
esm_tcr_cache_size: 4096
encoder: "esm2"

# === Reward Mode: Curriculum Climbing ===
reward_mode: "v2_curriculum_climbing"
use_delta_reward: false

# === Reward Weights ===
w_affinity: 1.0
w_decoy: 0.0  # 完全移除 decoy
w_naturalness: 0.05
w_diversity: 0.02
w_gap: 0.0  # 不使用 gap bonus

# === Curriculum Gates and Bonuses ===
# Gates: A 需要达到的阈值
curriculum_gates: [-2.0, -1.0, -0.5, 0.0, 0.6]
# Bonuses: 对应每个 gate 的累积奖励
curriculum_bonuses: [10.0, 15.0, 20.0, 30.0, 50.0]

# === Decoy Activation (不激活) ===
decoy_activation_threshold: 999.0  # 设置很高，永远不激活 decoy
gap_margin: 1.0

# === Affinity Scorer (tFold server) ===
affinity_model: "tfold"
tfold_server_socket: "/tmp/tfold_server.sock"
tfold_cache_path: "data/tfold_feature_cache_trace57_pure_target_bonus.db"

# === Decoy Scorer (DISABLED) ===
decoy_K: 0
n_contrast_decoys: 0
contrastive_agg: "mean"
decoy_tau: 10.0
decoy_tier_weights:
  A: 0
  B: 0
  D: 0
  C: 0
decoy_unlock_schedule:
  0: []

# === Naturalness Scorer (ESM Perplexity) ===
naturalness_threshold_zscore: -2.0
cdr3_ppl_stats: "data/cdr3_ppl_stats.json"

# === Diversity Scorer ===
diversity_buffer_size: 512
diversity_similarity_threshold: 0.85

# === Curriculum: Pure L2 base ===
l0_mutation_range: [3, 5]
l1_top_k: 500
curriculum_schedule:
  - {until: null, L0: 0.0, L1: 0.0, L2: 1.0}

# === Online TCR Pool (复用好的 TCR init) ===
online_tcr_pool_enabled: true
online_tcr_pool_start_step: 502000  # 从 500K checkpoint 后 2K 步开始
online_tcr_pool_warmup_steps: 20000
online_tcr_pool_max_ratio: 0.8
online_tcr_pool_max_per_target: 128
online_tcr_pool_min_affinity: -2.0
online_tcr_pool_max_decoy_violation: 999.0
online_tcr_pool_min_hamming: 2
online_tcr_pool_mutate_prob: 0.0

# === pMHC Embedding Centering (减少 peptide 相似度) ===
pmhc_embedding_transform: "center"

# === Target Sampling ===
target_sampling: "uniform"

# === Training Data ===
train_targets: "data/tfold_excellent_peptides.txt"

# === Evaluation ===
eval_interval: 999999999
eval_n_tcrs: 5
eval_n_decoys: 0
eval_abort_threshold: 0.40
eval_warmup: 500000

# === Checkpointing ===
checkpoint_interval: 20000
latest_checkpoint_interval: 2000
milestones: [520000, 540000, 560000, 580000, 600000, 620000, 640000, 660000,
  680000, 700000, 720000, 740000, 760000, 780000, 800000, 900000, 1000000,
  1200000, 1400000, 1600000, 1800000, 2000000]

# === Normalization (Disabled) ===
use_znorm: false
norm_window: 10000
norm_warmup: 1000

# === Random Seed ===
seed: 42

# === Paths ===
decoy_library_path: "/share/liuyutian/pMHC_decoy_library"
tcrdb_path: "/share/liuyutian/TCRPPO/data/tcrdb"
test_peptides_path: "/share/liuyutian/TCRPPO/data/test_peptides"
ergo_model_dir: "tcrppo_v2/ERGO/models"
ergo_ae_file: "tcrppo_v2/ERGO/TCR_Autoencoder/tcr_ae_dim_100.pt"
output_dir: "output"
results_dir: "results"
