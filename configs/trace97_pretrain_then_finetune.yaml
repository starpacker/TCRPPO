# trace97_pretrain_then_finetune: PRETRAIN ONLY — naturalness pretraining
#
# Reward = raw AE+GMM combined score (0~1), higher = more natural.
# No affinity scoring, no bonus, no penalty transformation.
# When satisfied, manually kill → load checkpoint → launch finetune separately.
#
# All other arch/env settings match trace94.

total_timesteps: 20_000
n_envs: 8
n_steps: 32
batch_size: 256
n_epochs: 4
learning_rate: 1.5e-4
gamma: 0.98
gae_lambda: 0.95
clip_range: 0.2
entropy_coef: 0.012
vf_coef: 0.5
max_grad_norm: 0.5

max_tcr_len: 20
min_tcr_len: 8
max_pep_len: 25
max_steps_per_episode: 8
max_steps: 8
hla_pseudoseq_len: 34
ban_stop: true
terminal_reward_only: true

hidden_dim: 512
esm_model: "esm2_t33_650M_UR50D"
esm_frozen: true
esm_device: "cuda"
esm_tcr_cache_size: 4096
encoder: "esm2"
use_biochem_features: true

# ====== PRETRAIN MODE ======
# This flag short-circuits reward_manager.compute_reward():
#   reward = naturalness_scorer.score_raw(tcr)   # raw combined 0~1
pretrain_naturalness_only: true

# reward_mode is irrelevant in pretrain (short-circuited), keep for reference
reward_mode: "v2_simple_target_gated_decoy"
use_delta_reward: false

# Weights — irrelevant in pretrain, kept for finetune reference
w_affinity: 1.0
w_decoy: 0.3
w_naturalness: 0.15
w_diversity: 0.02

# No affinity model needed in pretrain
affinity_model: "none"

# Decoy settings (inactive in pretrain, kept for reference)
decoy_K: 2
n_contrast_decoys: 0
contrastive_agg: "mean"
decoy_tau: 10.0
decoy_tier_weights: {A: 1, B: 1, D: 0, C: 0}
decoy_unlock_schedule: {}
decoy_difficulty: "easy"
decoy_difficulty_schedule: {}

# Naturalness — AE+GMM scorer (THE reward signal)
naturalness_scorer_type: "ae_gmm"
naturalness_ae_model: "/share/liuyutian/TCRPPO/code/reward/ae_model"
naturalness_gmm_model: "/share/liuyutian/TCRPPO/code/reward/gmm.pkl"
naturalness_blosum: "/share/liuyutian/TCRPPO/code/blosum.txt"
naturalness_ae_threshold: 0.8

# Diversity
diversity_buffer_size: 512
diversity_similarity_threshold: 0.85

# Pure L2 base (same as trace94)
l0_mutation_range: [3, 5]
l1_top_k: 500
curriculum_schedule:
  - {until: null, L0: 0.0, L1: 0.0, L2: 1.0}

# Online pool settings (same as trace94)
online_tcr_pool_enabled: true
online_tcr_pool_start_step: 10000
online_tcr_pool_warmup_steps: 5000
online_tcr_pool_max_ratio: 0.5
online_tcr_pool_max_per_target: 256
online_tcr_pool_min_affinity: -10.0
online_tcr_pool_max_decoy_violation: 999.0
online_tcr_pool_min_hamming: 2
online_tcr_pool_mutate_prob: 0.0

# Dynamic band selection (same as trace94)
online_tcr_pool_use_dynamic_bands: true
online_tcr_pool_recent_window: 50

target_sampling: "uniform"
train_targets: "data/tfold_excellent_peptides.txt"

eval_interval: 100000
eval_n_tcrs: 5
eval_n_decoys: 0
eval_abort_threshold: 0.40
eval_warmup: 100000

checkpoint_interval: 20000
latest_checkpoint_interval: 1000
# Milestones — keep 7000 checkpoint for finetune
milestones: [7000, 20000]

use_znorm: false
