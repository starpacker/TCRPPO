# trace76: trace75 dynamic initial-affinity curriculum plus no-op prevention.
#
# Goal:
#   Keep the dynamic init frontier sampling, but remove the conservative
#   same-token SUB shortcut and penalize no-progress edits below the preserve
#   threshold.

total_timesteps: 2_000_000
n_envs: 8
n_steps: 32
batch_size: 256
n_epochs: 4
learning_rate: 1.0e-4
gamma: 0.98
gae_lambda: 0.95
clip_range: 0.2
entropy_coef: 0.020
vf_coef: 0.5
max_grad_norm: 0.5

max_tcr_len: 20
min_tcr_len: 8
max_pep_len: 25
max_steps_per_episode: 8
max_steps: 8
hla_pseudoseq_len: 34
ban_stop: false
allow_stop_at_step0: true
stop_at_step0_min_init_affinity: 0.6
terminal_reward_only: true
active_clipping: true

hidden_dim: 512
esm_model: "esm2_t33_650M_UR50D"
esm_frozen: true
esm_device: "cuda:0"
esm_tcr_cache_size: 4096
encoder: "esm2"

reward_mode: "v2_simple_target_gated_decoy"
use_delta_reward: false
w_affinity: 1.0
w_decoy: 0.10
w_naturalness: 0.05
w_diversity: 0.02

preserve_high_init_threshold: 0.6
preserve_high_init_tolerance: 0.05
preserve_high_init_weight: 3.0
improve_low_init_threshold: 0.6
improve_low_init_min_delta: 0.05
improve_low_init_weight: 4.0
improve_low_init_max_penalty: 0.6

gate_schedule:
  674000: -1.5
  780000: -1.25
  900000: -1.0

target_decoy_gate_logit: -1.5
target_affinity_gate: -1.5
target_pass_bonus: 1.0
target_affinity_bonus: 1.0
decoy_affinity_center: -3.0
decoy_affinity_penalty_weight: 0.10
decoy_fixed_tiers: ["A", "B"]
decoy_k_per_tier: 1

affinity_model: "tfold"
tfold_server_socket: "/tmp/tfold_server_trace76_no_noop_dynamic_init.sock"
tfold_cache_path: "data/tfold_feature_cache_trace76_no_noop_dynamic_init.db"

decoy_K: 2
n_contrast_decoys: 0
contrastive_agg: "mean"
decoy_tau: 10.0
decoy_tier_weights: {A: 0, B: 0, D: 0, C: 0}
decoy_unlock_schedule: {}
decoy_difficulty: "easy"
decoy_difficulty_schedule: {}

naturalness_threshold_zscore: -2.0
cdr3_ppl_stats: "data/cdr3_ppl_stats.json"
diversity_buffer_size: 512
diversity_similarity_threshold: 0.85

l0_mutation_range: [3, 5]
l1_top_k: 500
curriculum_schedule:
  - {until: null, L0: 0.0, L1: 0.0, L2: 1.0}

online_tcr_pool_enabled: true
online_tcr_pool_start_step: 674000
online_tcr_pool_warmup_steps: 1
online_tcr_pool_max_ratio: 0.85
online_tcr_pool_max_per_target: 256
online_tcr_pool_min_affinity: -2.0
online_tcr_pool_max_decoy_violation: 999.0
online_tcr_pool_min_hamming: 2
online_tcr_pool_mutate_prob: 0.0
online_tcr_pool_use_dynamic_bands: true
online_tcr_pool_recent_window: 50
online_tcr_pool_snapshot_path: "output/trace73_curriculum_exploration/online_tcr_pool_snapshot.json"
online_tcr_pool_dynamic_mode: "below_mean"
online_tcr_pool_dynamic_below: 0.7
online_tcr_pool_dynamic_above: 0.0
online_tcr_pool_elite_ratio: 0.05
online_tcr_pool_elite_min_affinity: 0.6

target_sampling: "uniform"
train_targets: "data/tfold_excellent_peptides.txt"

eval_interval: 999999999
eval_n_tcrs: 5
eval_n_decoys: 0
eval_abort_threshold: 0.40
eval_warmup: 500000

checkpoint_interval: 20000
latest_checkpoint_interval: 2000
milestones: [680000, 700000, 720000, 760000, 800000, 840000, 900000,
  1000000, 1200000, 1400000, 1600000, 1800000, 2000000]
