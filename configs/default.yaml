# === PPO ===
total_timesteps: 10_000_000
n_envs: 8
n_steps: 128
batch_size: 256
n_epochs: 4
learning_rate: 3.0e-4
gamma: 0.90
gae_lambda: 0.95
clip_range: 0.2
entropy_coef: 0.05
vf_coef: 0.5
max_grad_norm: 0.5

# === Environment ===
max_tcr_len: 20
min_tcr_len: 8
max_pep_len: 25
max_steps_per_episode: 8
hla_pseudoseq_len: 34

# === Policy Network ===
hidden_dim: 512

# === ESM State Encoder ===
esm_model: "esm2_t33_650M_UR50D"
esm_frozen: true
esm_device: "cuda"
esm_tcr_cache_size: 4096

# === Reward Weights (raw, no z-score normalization) ===
w_affinity: 1.0
w_decoy: 0.8
w_naturalness: 0.5
w_diversity: 0.2

# === Credit Assignment ===
use_delta_reward: true

# === Affinity Scorer (ERGO) ===
affinity_model: "ergo"
ergo_model_file: "ae_mcpas1.pt"
affinity_mc_samples: 10

# === Decoy Scorer ===
decoy_K: 8
decoy_tau: 10.0
decoy_tier_weights:
  A: 3
  B: 3
  D: 2
  C: 1
decoy_unlock_schedule:
  0: [A]
  2000000: [A, B]
  5000000: [A, B, D]
  8000000: [A, B, D, C]

# === Naturalness Scorer (ESM Perplexity) ===
naturalness_threshold_zscore: -2.0
cdr3_ppl_stats: "data/cdr3_ppl_stats.json"

# === Diversity Scorer ===
diversity_buffer_size: 512
diversity_similarity_threshold: 0.85

# === Curriculum (DISABLED — pure L2 random TCRdb) ===
l0_mutation_range: [3, 5]
l1_top_k: 500
curriculum_schedule:
  - {until: null, L0: 0.0, L1: 0.0, L2: 1.0}

# === Target Sampling ===
target_sampling: "difficulty_weighted"

# === Online Eval ===
eval_interval: 100000
eval_n_tcrs: 5
eval_n_decoys: 50
eval_abort_threshold: 0.40
eval_warmup: 500000

# === Checkpointing ===
checkpoint_interval: 100000
latest_checkpoint_interval: 2000
milestones: [500000, 1000000, 2000000, 5000000, 10000000]

# === Ablation ===
reward_mode: "v2_full"

# === TFold (placeholder, not active in v2.0) ===
use_tfold: false
tfold_features_dir: null

# === Seed ===
seed: 42

# === Paths ===
decoy_library_path: "/share/liuyutian/pMHC_decoy_library"
tcrdb_path: "/share/liuyutian/TCRPPO/data/tcrdb"
test_peptides_path: "/share/liuyutian/TCRPPO/data/test_peptides"
ergo_model_dir: "tcrppo_v2/ERGO/models"
ergo_ae_file: "tcrppo_v2/ERGO/TCR_Autoencoder/tcr_ae_dim_100.pt"
output_dir: "output"
results_dir: "results"
l1_seeds_dir: "data/l1_seeds"
