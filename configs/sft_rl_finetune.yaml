# SFT + RL Fine-tuning (v2 - delta reward fix)
# Base: SFT filtered model (output/sft_filtered_training/checkpoint_final.pt)
# Goal: Fine-tune with RL to improve affinity from -5.49 to > -2.0
# Architecture: Match SFT (max_tcr_len=25, obs_dim=2560 without state scalars)
# Fix: v1 used absolute reward (all-negative for SFT model) causing policy collapse.
#      Now using delta reward (rewards improvement) + lower gate + higher entropy.

total_timesteps: 2_000_000
n_envs: 8
n_steps: 32
batch_size: 256
n_epochs: 4
learning_rate: 5.0e-5  # Lower LR for SFT fine-tuning (was 1.5e-4)
gamma: 0.98
gae_lambda: 0.95
clip_range: 0.15  # Tighter clipping for stability (was 0.2)
entropy_coef: 0.03  # Higher entropy to prevent collapse (was 0.012)
vf_coef: 0.5
max_grad_norm: 0.5

max_tcr_len: 25  # Match SFT architecture
min_tcr_len: 8
max_pep_len: 25
max_steps_per_episode: 8
max_steps: 8
hla_pseudoseq_len: 34
ban_stop: true
terminal_reward_only: true
include_state_scalars: false  # Match SFT obs_dim=2560 (no state scalars)

hidden_dim: 512
esm_model: "esm2_t33_650M_UR50D"
esm_frozen: true
esm_device: "cuda:0"  # Use GPU 0
esm_tcr_cache_size: 4096
encoder: "esm2"

reward_mode: "v2_simple_target_gated_decoy"
use_delta_reward: true  # KEY FIX: reward improvement, not absolute value
w_affinity: 1.0
w_delta_affinity: 1.0  # Equal weight on delta
w_decoy: 0.3
w_naturalness: 0.05
w_diversity: 0.02

# Gate set for SFT model starting from online pool (mean affinity -0.22)
target_affinity_gate: -1.0  # Achievable from SFT pool starting points
target_affinity_bonus: 1.0
decoy_affinity_penalty_weight: 0.3
target_decoy_gate_logit: -1.0  # Same as target_affinity_gate
target_pass_bonus: 1.0
decoy_affinity_center: -2.0  # Centered for SFT-quality starting sequences

affinity_model: "tfold"
tfold_server_socket: "/tmp/tfold_server_sft_rl_finetune.sock"
tfold_cache_path: "data/tfold_feature_cache.db"  # Reuse existing cache

decoy_K: 2
n_contrast_decoys: 0
contrastive_agg: "mean"
decoy_tau: 10.0
decoy_tier_weights: {A: 0, B: 0, D: 0, C: 0}
decoy_unlock_schedule: {}
decoy_difficulty: "easy"
decoy_difficulty_schedule: {}

naturalness_threshold_zscore: -2.0
cdr3_ppl_stats: "data/cdr3_ppl_stats.json"
diversity_buffer_size: 512
diversity_similarity_threshold: 0.85

# Curriculum: mostly online pool (SFT trajectories), some L2 exploration
l0_mutation_range: [3, 5]
l1_top_k: 500
curriculum_schedule:
  - {until: null, L0: 0.0, L1: 0.0, L2: 1.0}  # L2 only when online pool misses

# Online pool preloaded with SFT trajectory final TCRs (affinity > -1.0)
online_tcr_pool_enabled: true
online_tcr_pool_start_step: 0
online_tcr_pool_warmup_steps: 1  # Immediate 80% online pool usage from step 256+
online_tcr_pool_max_ratio: 0.8  # 80% from SFT pool, 20% L2 exploration
online_tcr_pool_max_per_target: 256
online_tcr_pool_min_affinity: -3.0  # Keep pool quality high (SFT TCRs are >-1.0)
online_tcr_pool_max_decoy_violation: 999.0
online_tcr_pool_min_hamming: 2
online_tcr_pool_mutate_prob: 0.0
online_tcr_pool_snapshot_path: "data/sft_online_pool_snapshot.json"  # Preload SFT TCRs

# Dynamic band selection
online_tcr_pool_use_dynamic_bands: true
online_tcr_pool_recent_window: 50

target_sampling: "uniform"
train_targets: "data/tfold_excellent_peptides.txt"

eval_interval: 999999999
eval_n_tcrs: 5
eval_n_decoys: 0
eval_abort_threshold: 0.40
eval_warmup: 500000

checkpoint_interval: 20000
latest_checkpoint_interval: 2000
milestones: [100000, 200000, 300000, 400000, 500000, 600000, 800000, 1000000, 1200000, 1500000, 2000000]

use_znorm: false
