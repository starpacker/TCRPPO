# trace78: Aggressive push to break mean affinity -0.5
#
# Base: trace73 latest checkpoint (step ~678K)
# Goal: Mean affinity > -0.5 within 50K steps
#
# Strategy:
#   1. Skip curriculum, go straight to gate -0.5
#   2. Increase online pool ratio to 0.85
#   3. Filter pool to only keep affinity > -0.8
#   4. Increase target bonus to 2.0
#   5. Reduce exploration (entropy 0.008)
#   6. Faster learning rate (2.0e-4)

total_timesteps: 1_000_000  # Train from 682K to 1M+ (300K+ new steps)
n_envs: 8
n_steps: 32
batch_size: 256
n_epochs: 4
learning_rate: 2.0e-4  # Faster adaptation (up from 1.2e-4)
gamma: 0.98
gae_lambda: 0.95
clip_range: 0.2
entropy_coef: 0.008  # Less exploration (down from 0.020)
vf_coef: 0.5
max_grad_norm: 0.5

max_tcr_len: 20
min_tcr_len: 8
max_pep_len: 25
max_steps_per_episode: 8
max_steps: 8
hla_pseudoseq_len: 34
ban_stop: true
terminal_reward_only: true

hidden_dim: 512
esm_model: "esm2_t33_650M_UR50D"
esm_frozen: true
esm_device: "cuda:2"  # Use GPU 2
esm_tcr_cache_size: 4096
encoder: "esm2"

reward_mode: "v2_simple_target_gated_decoy"
use_delta_reward: false
w_affinity: 1.0
w_decoy: 0.3
w_naturalness: 0.05
w_diversity: 0.02

# AGGRESSIVE: Skip curriculum, go straight to strict gate
target_affinity_gate: -0.5  # Strict gate (no warm-up)
target_affinity_bonus: 2.0  # High reward for passing (up from 1.0)
decoy_affinity_penalty_weight: 0.3

affinity_model: "tfold"
tfold_server_socket: "/tmp/tfold_server_trace78_aggressive_push.sock"
tfold_cache_path: "data/tfold_feature_cache.db"  # Reuse existing cache

decoy_K: 2
n_contrast_decoys: 0
contrastive_agg: "mean"
decoy_tau: 10.0
decoy_tier_weights: {A: 0, B: 0, D: 0, C: 0}
decoy_unlock_schedule: {}
decoy_difficulty: "easy"
decoy_difficulty_schedule: {}

naturalness_threshold_zscore: -2.0
cdr3_ppl_stats: "data/cdr3_ppl_stats.json"
diversity_buffer_size: 512
diversity_similarity_threshold: 0.85

l0_mutation_range: [3, 5]
l1_top_k: 500
curriculum_schedule:
  - {until: null, L0: 0.0, L1: 0.0, L2: 1.0}  # L2 only (random TCRdb)

# AGGRESSIVE: High pool ratio, strict filtering
online_tcr_pool_enabled: true
online_tcr_pool_start_step: 0
online_tcr_pool_warmup_steps: 1
online_tcr_pool_max_ratio: 0.85  # High pool usage (up from 0.5)
online_tcr_pool_max_per_target: 512  # Larger pool (up from 256)
online_tcr_pool_min_affinity: -1.5  # Keep decent TCRs (relaxed from -0.8)
online_tcr_pool_max_decoy_violation: 999.0
online_tcr_pool_min_hamming: 2
online_tcr_pool_mutate_prob: 0.0

# Dynamic band selection (focus on high-affinity bands)
online_tcr_pool_use_dynamic_bands: true
online_tcr_pool_recent_window: 100  # Larger window (up from 50)

target_sampling: "uniform"
train_targets: "data/tfold_excellent_peptides.txt"

eval_interval: 999999999
eval_n_tcrs: 5
eval_n_decoys: 0
eval_abort_threshold: 0.40
eval_warmup: 500000

checkpoint_interval: 5000
milestones: [10000, 20000, 30000, 40000, 50000, 60000, 75000, 100000]
