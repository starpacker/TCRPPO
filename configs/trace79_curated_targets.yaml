# trace79: Curated target set — cut unlearnable, add easy targets
#
# STRATEGY (fundamental change):
#   trace73 wastes ~80% of training on unlearnable targets (uniform sampling over 20).
#   Only 5/20 main targets ever reached affinity > 0.
#   Meanwhile, decoy targets like LLWRGSIYKL score BETTER (mean=+0.042, 50% >0).
#
#   Solution: curate a 10-target training set:
#     - Top 5 learnable main targets (from trace73 per-target analysis)
#     - 5 easy "decoy" targets that the model can actually learn on
#
#   This should dramatically improve mean affinity because:
#     1. No wasted episodes on impossible targets
#     2. More positive reward signal → better gradient signal
#     3. Model builds momentum from easy wins
#
# Base: trace73 checkpoint (proven policy, ~684K steps)
# Key differences from trace73:
#   - 10 curated targets instead of 20 random
#   - Higher pool ratio (0.7 vs 0.5) to exploit good sequences
#   - Gate starts at -2.0 (same as trace73, proven to work)
#   - Fresh tFold cache (new targets need new features)

total_timesteps: 2_000_000
n_envs: 8
n_steps: 32
batch_size: 256
n_epochs: 4
learning_rate: 1.2e-4  # Same as trace73 (proven)
gamma: 0.98
gae_lambda: 0.95
clip_range: 0.2
entropy_coef: 0.020  # Same as trace73 (good exploration)
vf_coef: 0.5
max_grad_norm: 0.5

max_tcr_len: 20
min_tcr_len: 8
max_pep_len: 25
max_steps_per_episode: 8
max_steps: 8
hla_pseudoseq_len: 34
ban_stop: true
terminal_reward_only: true

hidden_dim: 512
esm_model: "esm2_t33_650M_UR50D"
esm_frozen: true
esm_device: "cuda:0"  # GPU 0 has most free memory (~51GB free)
esm_tcr_cache_size: 4096
encoder: "esm2"

reward_mode: "v2_simple_target_gated_decoy"
use_delta_reward: false
w_affinity: 1.0
w_decoy: 0.3
w_naturalness: 0.05
w_diversity: 0.02

# Curriculum gate schedule — same proven approach as trace73
gate_schedule:
  644096: -2.0   # Start easy
  670000: -1.5
  700000: -1.0
  750000: -0.5   # Final target

target_affinity_gate: -2.0
target_affinity_bonus: 1.0
decoy_affinity_penalty_weight: 0.3

affinity_model: "tfold"
tfold_server_socket: "/tmp/tfold_server_trace79_curated.sock"
tfold_cache_path: "data/tfold_feature_cache.db"  # Reuse shared cache

decoy_K: 2
n_contrast_decoys: 0
contrastive_agg: "mean"
decoy_tau: 10.0
decoy_tier_weights: {A: 0, B: 0, D: 0, C: 0}
decoy_unlock_schedule: {}
decoy_difficulty: "easy"
decoy_difficulty_schedule: {}

naturalness_threshold_zscore: -2.0
cdr3_ppl_stats: "data/cdr3_ppl_stats.json"
diversity_buffer_size: 512
diversity_similarity_threshold: 0.85

l0_mutation_range: [3, 5]
l1_top_k: 500
curriculum_schedule:
  - {until: null, L0: 0.0, L1: 0.0, L2: 1.0}

# Online pool: slightly more aggressive than trace73
online_tcr_pool_enabled: true
online_tcr_pool_start_step: 644096
online_tcr_pool_warmup_steps: 1
online_tcr_pool_max_ratio: 0.7  # Higher than trace73's 0.5 — exploit good seqs more
online_tcr_pool_max_per_target: 256
online_tcr_pool_min_affinity: -10.0  # Same as trace73 — no filter, let pool build
online_tcr_pool_max_decoy_violation: 999.0
online_tcr_pool_min_hamming: 2
online_tcr_pool_mutate_prob: 0.0

online_tcr_pool_use_dynamic_bands: true
online_tcr_pool_recent_window: 50

target_sampling: "uniform"
train_targets: "data/trace79_curated_targets.txt"  # ← THE KEY CHANGE: 10 curated targets

eval_interval: 999999999
eval_n_tcrs: 5
eval_n_decoys: 0
eval_abort_threshold: 0.40
eval_warmup: 500000

checkpoint_interval: 20000
milestones: [660000, 670000, 680000, 700000, 720000, 750000, 800000, 900000, 1000000, 1200000, 1500000, 2000000]
