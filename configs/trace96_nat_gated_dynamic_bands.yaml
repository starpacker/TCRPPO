# trace96_nat_gated_dynamic_bands: Naturalness-gated affinity + dynamic band sampling
#
# Train from scratch with strict naturalness enforcement
# Key features:
#   1. Naturalness gating: Ban affinity reward if naturalness < threshold
#   2. Dynamic pool bands: Adjust sampling based on current mean affinity
#   3. AE+GMM naturalness scorer (catches poly-C exploit)
#   4. FP32 tFold affinity scoring
#   5. Higher decoy weight (1.0) and pass bonus (3.0) after crossing gate
#   6. Fresh dynamic pool starting from step 10k

total_timesteps: 2_000_000
n_envs: 8
n_steps: 32
batch_size: 256
n_epochs: 4
learning_rate: 1.5e-4
gamma: 0.98
gae_lambda: 0.95
clip_range: 0.2
entropy_coef: 0.012
vf_coef: 0.5
max_grad_norm: 0.5

max_tcr_len: 20
min_tcr_len: 8
max_pep_len: 25
max_steps_per_episode: 8
max_steps: 8
hla_pseudoseq_len: 34
ban_stop: true
terminal_reward_only: true
use_biochem_features: false  # Set to true to add 8D charge+hydrophobicity features

hidden_dim: 512
esm_model: "esm2_t33_650M_UR50D"
esm_frozen: true
esm_device: "cuda"
esm_tcr_cache_size: 4096
encoder: "esm2"

# Same reward mode as trace61
reward_mode: "v2_simple_target_gated_decoy"
use_delta_reward: false

# Weights — naturalness significantly increased, decoy weight at 1.0
w_affinity: 1.0
w_decoy: 1.0
w_naturalness: 0.15
w_diversity: 0.02

# Gate raised to 0.0 + stronger bonus (increased for trace96)
target_decoy_gate_logit: 0.0
target_pass_bonus: 3.0
decoy_affinity_penalty_weight: 0.3

# FP32 tFold (no AMP wrapper)
affinity_model: "tfold"
tfold_server_socket: "/tmp/tfold_server_trace96.sock"
tfold_cache_path: "data/tfold_cache_trace96.db"

# Decoy settings (same as trace61)
decoy_K: 2
n_contrast_decoys: 0
contrastive_agg: "mean"
decoy_tau: 10.0
decoy_tier_weights: {A: 1, B: 1, D: 0, C: 0}
decoy_unlock_schedule: {}
decoy_difficulty: "easy"
decoy_difficulty_schedule: {}

# Naturalness — AE+GMM scorer with GATING (ban affinity if unnatural)
naturalness_scorer_type: "ae_gmm"
naturalness_ae_model: "/share/liuyutian/TCRPPO/code/reward/ae_model"
naturalness_gmm_model: "/share/liuyutian/TCRPPO/code/reward/gmm.pkl"
naturalness_blosum: "/share/liuyutian/TCRPPO/code/blosum.txt"
naturalness_ae_threshold: 0.8
# NEW: Gate affinity reward based on naturalness
naturalness_gate_affinity: true
naturalness_gate_threshold: -0.30  # If penalty < -0.30 (combined < 0.5), ban affinity reward

# Diversity (unchanged)
diversity_buffer_size: 512
diversity_similarity_threshold: 0.85

# Pure L2 base (50% from start, will mix with online pool)
l0_mutation_range: [3, 5]
l1_top_k: 500
curriculum_schedule:
  - {until: null, L0: 0.0, L1: 0.0, L2: 1.0}

# Online pool with ADAPTIVE dynamic band selection — fresh start from step 10k
online_tcr_pool_enabled: true
online_tcr_pool_start_step: 10000
online_tcr_pool_warmup_steps: 50000
online_tcr_pool_max_ratio: 0.5
online_tcr_pool_max_per_target: 256
online_tcr_pool_min_affinity: -10.0
online_tcr_pool_max_decoy_violation: 999.0
online_tcr_pool_min_hamming: 2
online_tcr_pool_mutate_prob: 0.0

# NEW: Adaptive dynamic band selection based on mean affinity
# When mean ∈ [-4, -2], sample from < -4
# When mean ∈ [-2, -1], sample from [-4, -2]
# When mean ∈ [-1, 0], sample from [-2, -1]
# When mean ∈ [0, +∞], sample from [-1, 0]
online_tcr_pool_use_dynamic_bands: true
online_tcr_pool_adaptive_bands: true
online_tcr_pool_recent_window: 50

target_sampling: "uniform"
train_targets: "data/tfold_excellent_peptides.txt"

eval_interval: 100000
eval_n_tcrs: 5
eval_n_decoys: 0
eval_abort_threshold: 0.40
eval_warmup: 100000

checkpoint_interval: 20000
latest_checkpoint_interval: 2000
milestones: [100000, 200000, 300000, 400000, 500000, 600000, 700000, 800000,
  900000, 1000000, 1200000, 1400000, 1600000, 1800000, 2000000]

use_znorm: false
